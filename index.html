<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Meow+Script&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables */
        :root {
            --olive-green: #4f5d37;
            --beige: #e9e5d9;
            --burnt-orange: #c06c42;
            --dark-text: #2c331d;
            --bg-light: #f4f4f4;
        }

        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Lora', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Layout Structure */
        .portfolio-wrapper {
            background-color: var(--olive-green);
            /* Creating the asymmetrical framing effect from the design */
            padding: 2rem 6rem 2rem 2rem; 
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .portfolio-card {
            background-color: var(--beige);
            display: flex;
            flex-direction: row;
            width: 100%;
            overflow: hidden;
        }

        /* Left Column: Text Block */
        .text-section {
            flex: 1.2;
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .signature {
            font-family: 'Meow Script', cursive;
            font-size: 4rem;
            color: var(--dark-text);
            transform: rotate(-5deg);
            margin-bottom: 3rem;
            line-height: 1;
        }

        .main-text {
            color: var(--burnt-orange);
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 4rem;
            font-weight: 400;
        }

        /* Button & Hover Interaction */
        .action-container {
            text-align: center;
            margin-top: auto;
        }

        .portfolio-btn {
            display: inline-block;
            background-color: transparent;
            color: var(--burnt-orange);
            font-family: inherit;
            font-size: 1rem;
            text-decoration: none;
            padding: 0.75rem 2rem;
            border: 1px solid var(--burnt-orange);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Fill effect on hover */
        .portfolio-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--burnt-orange);
            z-index: -1;
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .portfolio-btn:hover {
            color: var(--beige);
        }

        .portfolio-btn:hover::before {
            transform: scaleY(1);
        }

        /* Right Column: Portrait Image */
        .image-section {
            flex: 1;
            display: flex;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: grayscale(100%);
            min-height: 400px; /* Ensures image has presence before loading */
        }

        /* Responsive Design */
        @media (max-width: 860px) {
            .portfolio-wrapper {
                padding: 1.5rem; /* Even padding on smaller screens */
            }

            .portfolio-card {
                flex-direction: column;
            }

            .text-section {
                padding: 3rem 2rem;
                text-align: center;
            }

            .signature {
                margin-bottom: 2rem;
            }

            .main-text {
                font-size: 1.15rem;
                margin-bottom: 2.5rem;
            }

            .image-section img {
                max-height: 500px;
            }
        }
    </style>
</head>
<body>

    <main class="portfolio-wrapper">
        <article class="portfolio-card">
            
            <section class="text-section">
                <div class="signature">Vinícius Xavier</div>
                
                <p class="main-text">
                    Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Quis ipsum suspendisse ultrices gravida. Risus commodo viverra maecenas accumsan lacus vel facilisis.
                </p>

                <div class="action-container">
                    <a href="#" class="portfolio-btn">View full portfolio</a>
                </div>
            </section>

            <section class="image-section">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=800&auto=format&fit=crop" alt="Black and white portrait of a man">
            </section>

        </article>
    </main>

</body>
</html>
